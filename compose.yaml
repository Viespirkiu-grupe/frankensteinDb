name: frankensteindb

services:
  frankensteindb:
    image: ${FRANKENSTEINDB_IMAGE:-ghcr.io/your-org/frankensteindb:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_PROFILE: ${FRANKENSTEINDB_BUILD_PROFILE:-release}
    restart: unless-stopped
    ports:
      - "${FRANKENSTEINDB_PORT:-8080}:8080"
    environment:
      FRANKENSTEINDB_API_KEY: ${FRANKENSTEINDB_API_KEY:-change-me-before-production}
    volumes:
      - frankensteindb-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    stop_grace_period: 30s

volumes:
  frankensteindb-data:
